<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Battleforge — Age of Sigmar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surf:#141418;--surf2:#1c1c22;--surf3:#24242c;--bdr:#2e2e3a;
  --gold:#c9922a;--goldd:#7a5818;--red:#8b2020;--red2:#c0392b;
  --txt:#e8e0d0;--txtd:#9a9080;--txtf:#5a5448;--acc2:#5b9fc0;
  --grn:#2a6b3a;--grn2:#4caf6a;
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:15px}
body{background-image:radial-gradient(ellipse at 15% 0%,rgba(201,146,42,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(58,107,138,.05) 0%,transparent 55%)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--goldd);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes diceAnim{0%{transform:rotate(0)scale(1)}50%{transform:rotate(180deg)scale(1.3)}100%{transform:rotate(360deg)scale(1)}}
.page{max-width:960px;margin:0 auto;padding:0 0 60px}
.hdr{padding:22px 22px 16px;border-bottom:1px solid var(--bdr);background:linear-gradient(to bottom,rgba(201,146,42,.06),transparent);position:relative}
.hdr-eye{color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--txt);letter-spacing:3px}
.hdr-title span{color:var(--gold)}
.hdr-sub{color:var(--txtf);font-size:12px;font-style:italic;margin-top:3px}
/* Save selector in header */
.save-bar{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.save-label{color:var(--txtd);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.save-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--txtd);border-radius:3px;padding:4px 10px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;font-weight:700;transition:all .2s}
.save-btn.on{background:var(--gold);color:#0d0d10;border-color:var(--gold)}
.save-hint{color:var(--txtf);font-size:11px;font-style:italic}
/* Tabs */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}
.tab{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txtd);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-weight:700}
.tab.on{border-bottom-color:var(--gold);color:var(--gold)}
.tab-icon{font-size:13px;margin-bottom:2px;display:block}
.content{padding:20px 20px;animation:fadeIn .3s ease}
/* Cards */
.dcard{background:var(--surf);border:1px solid var(--bdr);border-radius:4px;padding:14px 16px;margin-bottom:10px}
.sec-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.lbl{color:var(--txtd);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;font-family:'Cinzel',serif}
.sep{display:flex;align-items:center;gap:10px;margin:14px 0 10px}
.sep-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--goldd))}.sep-line.r{background:linear-gradient(to left,transparent,var(--goldd))}
.sep-lbl{color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}
.grid{display:grid;gap:10px}.g2{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.gfill{grid-template-columns:repeat(auto-fill,minmax(125px,1fr))}
input,select{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:14px;padding:5px 9px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--goldd)}
input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button{opacity:.3}
.btn{cursor:pointer;border:none;border-radius:3px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;padding:7px 16px;font-size:11px}
.btn-gold{background:linear-gradient(135deg,var(--goldd),var(--gold));color:#0d0d10}.btn-gold:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;color:var(--txtd);border:1px solid var(--bdr)}.btn-ghost:hover{background:var(--surf2);color:var(--txt)}
.btn-red{background:var(--red);color:var(--txt)}
.ic-btn{width:26px;height:26px;border:none;border-radius:3px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--txt);flex-shrink:0}
.ic-btn:hover{filter:brightness(1.2)}
/* Role tags */
.rtag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.5px;font-family:'Cinzel',serif}
.rtag-Leader{background:#FAEEDA;color:#633806}.rtag-Battleline{background:#E6F1FB;color:#0C447C}
.rtag-Artillery{background:#FCEBEB;color:#791F1F}.rtag-Behemoth{background:#EAF3DE;color:#27500A}.rtag-Other{background:#F1EFE8;color:#444441}
/* Weapon table */
.w-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:3px;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.w-row:last-child{border-bottom:none}
.w-hdr{color:var(--txtd);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-family:'Cinzel',serif}
/* Avg dmg badge */
.dmg-badge{display:inline-block;background:var(--surf3);border:1px solid var(--goldd);border-radius:3px;padding:2px 8px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold)}
.dmg-badge.good{background:rgba(42,107,58,.25);border-color:var(--grn2);color:var(--grn2)}
.dmg-badge.zero{color:var(--txtf);border-color:var(--bdr);background:transparent}
/* Unit cards */
.unit-card{background:var(--surf);border:1px solid var(--bdr);border-radius:4px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.unit-card:hover{border-color:var(--goldd)}
.unit-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;user-select:none;gap:8px}
.unit-hdr:hover{background:var(--surf2)}
.unit-body{padding:6px 13px 12px;border-top:1px solid var(--bdr);animation:fadeIn .2s ease}
/* Edit mode */
.edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:8px}
.edit-row{display:grid;grid-template-columns:2fr repeat(6,1fr);gap:5px;align-items:center;margin-bottom:4px;font-size:12px}
.edit-row input{padding:3px 5px;font-size:12px}
/* Points bar */
.pts-bar-wrap{height:6px;background:var(--surf3);border-radius:4px;overflow:hidden;margin:5px 0}
.pts-bar{height:100%;border-radius:4px;transition:width .45s}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;width:100%;max-width:760px;padding:18px;max-height:90vh;display:flex;flex-direction:column}
.modal-list{overflow-y:auto;flex:1}
.db-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:9px 12px;margin-bottom:6px;transition:border-color .2s}
.db-card:hover{border-color:var(--goldd)}
/* Army picker */
.army-pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;margin-bottom:12px}
.army-btn{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .2s;width:100%}
.army-btn:hover{border-color:var(--goldd);background:var(--surf3)}.army-btn.selected{border-color:var(--gold);background:var(--surf3)}
.army-btn-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px}
.army-btn-count{font-size:11px;color:var(--txtd)}
/* Big numbers */
.big-val{font-family:'Cinzel',serif;font-size:34px;font-weight:900;color:var(--gold)}
.stat-val{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:34px;height:18px;border-radius:9px;border:1px solid var(--bdr);position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.toggle-thumb{width:12px;height:12px;border-radius:6px;position:absolute;top:2px;transition:left .2s}
/* Purple for abilities */
.ab-tag{font-size:10px;color:#b08adf;font-style:italic}
/* Battle army panel */
.battle-army-panel{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:10px 12px;margin-bottom:8px}
.battle-unit-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.battle-unit-row:last-child{border-bottom:none}
</style>
</head>

// ── Damage calc ──────────────────────────────────────────────────────────────
function calcAvgDmg(w, save, size){
  const atk=w.atk_avg, hit=w.hit_prob, wnd=w.wnd_prob, dmg=w.dmg_avg, rv=w.rnd_int;
  if([atk,hit,wnd,dmg].some(x=>x==null||x===undefined||isNaN(x))) return null;
  const sz = size||1;
  const eff=Math.max(2,Math.min(7,save-rv));
  const sf=Math.min(1,Math.max(0,(eff-1)/6));
  const ab=String(w.abilities||'');
  const hasChamp=ab.includes('Champion');
  const hasMort=ab.includes('Crit: Mortal');
  const has2Hit=ab.includes('Crit: 2 Hits');
  const hasAuto=ab.includes('Crit: Auto-wound');
  const tot=sz*atk;
  let avg;
  if(hasMort&&hasAuto)      avg=tot*((1/6)*dmg+Math.max(0,hit-1/6)*sf*dmg);
  else if(hasMort&&has2Hit) avg=tot*((1/6)*dmg+(Math.max(0,hit-1/6)+1/6)*wnd*sf*dmg);
  else if(hasMort)          avg=tot*((1/6)*dmg+Math.max(0,hit-1/6)*wnd*sf*dmg);
  else if(has2Hit&&hasAuto) avg=tot*((2/6)*sf*dmg+Math.max(0,hit-1/6)*wnd*sf*dmg);
  else if(has2Hit)          avg=tot*Math.max(0,hit+1/6)*wnd*sf*dmg;
  else if(hasAuto)          avg=tot*((1/6)*sf*dmg+Math.max(0,hit-1/6)*wnd*sf*dmg);
  else                      avg=tot*hit*wnd*sf*dmg;
  return avg;
}

function unitTotalDmg(unit, save){
  // Sum best weapon's avg dmg (highest) across all weapons
  let best=null;
  for(const w of unit.weapons){
    const a=calcAvgDmg(w, save, unit.size);
    if(a!=null && (best==null||a>best)) best=a;
  }
  return best;
}

const roll=d=>Math.floor(Math.random()*d)+1;
const rollN=(n,d)=>Array.from({length:n},()=>roll(d));

function avgCombat(c){
  const rh=c.rerollHits,rw=c.rerollWounds;
  const hc=rh==='all'?(7-c.toHit)/6+((c.toHit-1)/6)*((7-c.toHit)/6):rh==='ones'?(7-c.toHit)/6+(1/6)*((7-c.toHit)/6):(7-c.toHit)/6;
  const wc=rw==='all'?(7-c.toWound)/6+((c.toWound-1)/6)*((7-c.toWound)/6):rw==='ones'?(7-c.toWound)/6+(1/6)*((7-c.toWound)/6):(7-c.toWound)/6;
  const eff=Math.min(6,c.saveChar+c.rend),fs=Math.min(1,(eff-1)/6),dmg=c.damage==='d6'?3.5:+c.damage;
  const fnp=c.fnp!=='none'?(+c.fnp-1)/6:1,mort=c.mortalsOn6?c.attacks*(1/6):0;
  return (c.attacks*hc*wc*fs*dmg*fnp+mort).toFixed(2);
}
function sim1000(c){
  const res=[];
  for(let i=0;i<1000;i++){
    let hits=0,mort=0;
    rollN(c.attacks,6).forEach(r=>{if(c.mortalsOn6&&r===6)mort++;if(r>=c.toHit)hits++;});
    const eff=Math.min(6,c.saveChar+c.rend);
    const wounds=rollN(hits,6).filter(r=>r>=c.toWound).length;
    const unsaved=rollN(wounds,6).filter(r=>r<eff).length;
    let dmg=mort;
    for(let j=0;j<unsaved;j++){const d=c.damage==='d6'?roll(6):+c.damage;dmg+=c.fnp!=='none'&&roll(6)>=+c.fnp?0:d;}
    res.push(dmg);
  }
  const avg=(res.reduce((a,b)=>a+b,0)/1000).toFixed(2);
  const freq={};res.forEach(d=>freq[d]=(freq[d]||0)+1);
  return{avg,max:Math.max(...res),min:Math.min(...res),p10:(res.filter(d=>d>=10).length/10).toFixed(1),freq};
}

        const inRoster=a.units.find(x=>x.dbId===u.id);
        const armyColor=ARMY_COLORS[u.army]||'#c9922a';
        const dc=e('div',{cls:'db-card'},
          e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px',flexWrap:'wrap',gap:'5px'}},
            e('div',{style:{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}},
              e('div',{style:{width:'7px',height:'7px',borderRadius:'2px',background:armyColor,flexShrink:'0'}}),
              e('span',{style:{fontWeight:'600',fontSize:'13px',color:'var(--txt)'}},u.name),
              e('span',{cls:'rtag rtag-'+u.role},u.role),
              dmgBadge(bestDmg)
            ),
            e('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              e('span',{style:{color:'var(--txtd)',fontSize:'11px'}},u.faction),
              e('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Cinzel',serif",fontSize:'12px'}},u.pts+' pts'),
              (()=>{
                const ab=e('button',{style:{background:inRoster?'var(--grn)':'linear-gradient(135deg,var(--goldd),var(--gold))',color:inRoster?'var(--txt)':'#0d0d10',border:'none',borderRadius:'3px',padding:'4px 10px',cursor:'pointer',fontWeight:'700',fontSize:'10px',letterSpacing:'1px',fontFamily:"'Cinzel',serif"}},inRoster?'+ Again':'+ Add');
                ab.onclick=()=>{
                  const ex=a.units.find(x=>x.dbId===u.id);
                  if(ex){ex.count=(ex.count||1)+1;ex.pts=ex.basePts*ex.count;}
                  else a.units.push({id:Date.now(),dbId:u.id,name:u.name,role:u.role,faction:u.faction,army:u.army,pts:u.pts,basePts:u.pts,count:1,weapons:u.weapons});
                  rd();
                };return ab;
              })()
            )
          ),
          wTable(u.weapons,S.save,size)
        );
        ml.append(dc);
      });
      return ml;
    };
    const getFiltered=()=>DB.filter(u=>{
      const q=searchIn.value.toLowerCase();
      return (!q||u.name.toLowerCase().includes(q)||u.faction.toLowerCase().includes(q))
        &&(armySel.value==='All'||u.army===armySel.value)
        &&(facSel.value==='All'||u.faction===facSel.value)
        &&(rolSel.value==='All'||u.role===rolSel.value);
    });
    const searchIn=e('input',{type:'text',placeholder:'Search...',value:s.search,style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)'}});
    const armySel=e('select',{style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)'}},...ARMIES.map(arm=>{const op=e('option',{value:arm},arm);if(arm===s.filterArmy)op.selected=true;return op;}));
    const facSel=e('select',{style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)'}});
    const updateFacSel=()=>{facSel.innerHTML='';[e('option',{value:'All'},'All sub-factions'),...[...new Set(DB.filter(u=>u.army===armySel.value).map(u=>u.faction))].sort().map(f=>e('option',{value:f},f))].forEach(o=>facSel.append(o));};
    updateFacSel();
    const rolSel=e('select',{style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)'}});
    [e('option',{value:'All'},'All roles'),...ROLES.map(r=>e('option',{value:r},r))].forEach(o=>rolSel.append(o));
    let listEl=buildList(getFiltered());
    const refilter=()=>{const newList=buildList(getFiltered());listEl.replaceWith(newList);listEl=newList;};
    searchIn.oninput=refilter;
    armySel.onchange=()=>{s.filterArmy=armySel.value;updateFacSel();refilter();};
    facSel.onchange=refilter; rolSel.onchange=refilter;
    const modal=e('div',{cls:'modal'},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
        e('div',{style:{fontFamily:"'Cinzel',serif",fontWeight:'700',fontSize:'13px',color:'var(--gold)',letterSpacing:'2px',textTransform:'uppercase'}},'Unit Database'),
        e('button',{style:{background:'none',border:'1px solid var(--bdr)',color:'var(--txtd)',borderRadius:'3px',padding:'4px 10px',cursor:'pointer',fontSize:'11px',fontFamily:"'Cinzel',serif"},onclick:()=>{s.showModal=false;rd();}},'\u2715 Close')
      ),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'6px',marginBottom:'10px'}},searchIn,armySel,facSel,rolSel),
      listEl
    );
    const ov=e('div',{cls:'modal-overlay'},modal);
    ov.onclick=ev=>{if(ev.target===ov){s.showModal=false;rd();}};
    c.append(ov);
  }
}

// ── DICE TAB ────────────────────────────────────────────────────────────────
function renderDice(c){
  const s=S.dice;
  const rd=()=>{c.innerHTML='';renderDice(c);};
  c.append(e('div',{cls:'sec-title'},'\uD83C\uDFB2 Dice Roller'));
  const dTypes=[4,6,8,10,12,20];
  c.append(e('div',{style:{marginBottom:'14px'}},e('span',{cls:'lbl',style:{display:'block',marginBottom:'5px'}},'Dice Type'),e('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}},...dTypes.map(d=>{const b=e('button',{style:{background:s.dtype===d?'var(--gold)':'var(--surf2)',border:'1px solid '+(s.dtype===d?'var(--gold)':'var(--bdr)'),color:s.dtype===d?'#0d0d10':'var(--txt)',borderRadius:'3px',padding:'5px 9px',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:"'Cinzel',serif",transition:'all .2s'}},'D'+d);b.onclick=()=>{s.dtype=d;rd();};return b;}))));
  const cr=e('div',{style:{display:'flex',gap:'10px',marginBottom:'14px',alignItems:'flex-end'}});
  const ci=e('input',{type:'number',value:s.count,min:1,max:20,style:{width:'74px'}});ci.oninput=ev=>s.count=+ev.target.value;
  const cl=e('label',{style:{display:'flex',flexDirection:'column',gap:'3px'}},e('span',{cls:'lbl'},'Count'),ci);
  const rb=e('button',{cls:'btn btn-gold',style:{alignSelf:'flex-end'}},'Roll '+s.count+'d'+s.dtype);
  rb.onclick=()=>{s.rolling=true;rd();setTimeout(()=>{s.results=rollN(s.count,s.dtype);s.history=[{rolls:s.results.slice(),type:s.dtype,total:s.results.reduce((a,b)=>a+b,0),time:new Date().toLocaleTimeString()},...s.history.slice(0,9)];s.rolling=false;rd();},400);};
  cr.append(cl,rb);c.append(cr);
  if(s.rolling){c.append(e('div',{cls:'dcard',style:{textAlign:'center',padding:'24px 0'}},e('div',{style:{fontSize:'32px',display:'inline-block',animation:'diceAnim .4s ease infinite'}},'\uD83C\uDFB2'),e('div',{style:{color:'var(--txtf)',fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',marginTop:'7px',fontFamily:"'Cinzel',serif"}},'Rolling...')));return;}
  if(s.results.length){
    const faces=['','\u2680','\u2681','\u2682','\u2683','\u2684','\u2685'];
    const dw=e('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'10px'}});
    s.results.forEach((r,i)=>{
      const isH=r>=s.dtype*.8,isL=r<=s.dtype*.2;
      dw.append(e('div',{style:{width:'38px',height:'38px',borderRadius:'5px',background:isH?'rgba(201,146,42,.18)':isL?'rgba(192,57,43,.18)':'var(--surf2)',border:'2px solid '+(isH?'var(--gold)':isL?'var(--red2)':'var(--bdr)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:s.dtype===6?'22px':'13px',fontWeight:'700',color:isH?'var(--gold)':isL?'var(--red2)':'var(--txt)',fontFamily:s.dtype===6?'serif':"'Cinzel',serif",animation:'fadeIn .2s ease '+(i*.04)+'s both'}},s.dtype===6?faces[r]:r));
    });
    const tot=s.results.reduce((a,b)=>a+b,0);
    const sr=e('div',{style:{display:'flex',gap:'18px',flexWrap:'wrap'}});
    [['Total',tot,'var(--gold)'],['Avg',(tot/s.results.length).toFixed(1),'var(--txt)'],['High',Math.max(...s.results),'var(--gold)'],['Low',Math.min(...s.results),'var(--red2)']].forEach(([l,v,col])=>{
      sr.append(e('div',{},e('span',{cls:'lbl'},l),e('span',{style:{fontFamily:"'Cinzel',serif",fontSize:'18px',fontWeight:'700',color:col}},v)));
    });
    c.append(e('div',{cls:'dcard',style:{marginBottom:'10px'}},dw,sr));
  }
  if(s.history.length){
    c.append(e('div',{cls:'sep'},e('div',{cls:'sep-line'}),e('span',{cls:'sep-lbl'},'History'),e('div',{cls:'sep-line r'})));
    s.history.forEach((h,i)=>{c.append(e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 7px',background:i===0?'var(--surf)':'transparent',border:i===0?'1px solid var(--bdr)':'1px solid transparent',borderRadius:'3px',opacity:Math.max(0.25,1-i*.09)}},e('span',{style:{color:'var(--txtf)',fontSize:'11px'}},h.time),e('span',{style:{color:'var(--txtd)',fontSize:'12px'}},h.rolls.length+'d'+h.type+': ['+h.rolls.join(', ')+']'),e('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Cinzel',serif",fontSize:'13px'}},'= '+h.total)));});
  }
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
const TABS=[{id:'combat',icon:'\u2694',lbl:'Combat'},{id:'battle',icon:'\uD83E\uDE78',lbl:'Battle'},{id:'roster',icon:'\uD83D\uDCCB',lbl:'Roster'},{id:'dice',icon:'\uD83C\uDFB2',lbl:'Dice'}];
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  app.append(renderHeader());
  app.append(e('div',{cls:'tabs'},...TABS.map(t=>{const b=e('button',{cls:'tab'+(S.tab===t.id?' on':'')},e('span',{cls:'tab-icon'},t.icon),t.lbl);b.onclick=()=>{S.tab=t.id;render();};return b;})));
  const ct=e('div',{cls:'content'});
  if(S.tab==='combat')renderCombat(ct);
  else if(S.tab==='battle')renderBattle(ct);
  else if(S.tab==='roster')renderRoster(ct);
  else renderDice(ct);
  app.append(ct);
}
render();
</script>
