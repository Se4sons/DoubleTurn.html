<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Battleforge — Age of Sigmar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surf:#141418;--surf2:#1c1c22;--surf3:#24242c;--bdr:#2e2e3a;
  --gold:#c9922a;--goldd:#7a5818;--red:#8b2020;--red2:#c0392b;
  --txt:#e8e0d0;--txtd:#9a9080;--txtf:#5a5448;--acc2:#5b9fc0;
  --grn:#2a6b3a;--grn2:#4caf6a;
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:15px}
body{background-image:radial-gradient(ellipse at 15% 0%,rgba(201,146,42,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(58,107,138,.05) 0%,transparent 55%)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--goldd);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes diceAnim{0%{transform:rotate(0)scale(1)}50%{transform:rotate(180deg)scale(1.3)}100%{transform:rotate(360deg)scale(1)}}
.page{max-width:960px;margin:0 auto;padding:0 0 60px}
/* Header */
.hdr{padding:18px 20px 12px;border-bottom:1px solid var(--bdr);background:linear-gradient(to bottom,rgba(201,146,42,.06),transparent)}
.hdr-eye{color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:3px}
.hdr-title span{color:var(--gold)}
.hdr-sub{color:var(--txtf);font-size:12px;font-style:italic;margin-top:3px}
.save-bar{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.save-label{color:var(--txtd);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.save-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--txtd);border-radius:3px;padding:4px 9px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;font-weight:700;transition:all .2s}
.save-btn.on{background:var(--gold);color:#0d0d10;border-color:var(--gold)}
.save-hint{color:var(--txtf);font-size:11px;font-style:italic}
/* Tabs */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}
.tab{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txtd);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-weight:700}
.tab.on{border-bottom-color:var(--gold);color:var(--gold)}
.tab-icon{font-size:13px;margin-bottom:2px;display:block}
.content{padding:18px 20px;animation:fadeIn .3s ease}
/* Cards & layout */
.dcard{background:var(--surf);border:1px solid var(--bdr);border-radius:4px;padding:13px 15px;margin-bottom:10px}
.sec-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.lbl{color:var(--txtd);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;font-family:'Cinzel',serif}
.sep{display:flex;align-items:center;gap:10px;margin:14px 0 10px}
.sep-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--goldd))}.sep-line.r{background:linear-gradient(to left,transparent,var(--goldd))}
.sep-lbl{color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}
.grid{display:grid;gap:10px}.g2{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.gfill{grid-template-columns:repeat(auto-fill,minmax(125px,1fr))}
/* Inputs */
input,select{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:14px;padding:5px 9px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--goldd)}
input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button{opacity:.3}
/* Buttons */
.btn{cursor:pointer;border:none;border-radius:3px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;padding:7px 16px;font-size:11px}
.btn-gold{background:linear-gradient(135deg,var(--goldd),var(--gold));color:#0d0d10}.btn-gold:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;color:var(--txtd);border:1px solid var(--bdr)}.btn-ghost:hover{background:var(--surf2);color:var(--txt)}
.ic-btn{width:26px;height:26px;border:none;border-radius:3px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--txt);flex-shrink:0}
.ic-btn:hover{filter:brightness(1.2)}
/* Role tags */
.rtag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.5px;font-family:'Cinzel',serif;white-space:nowrap;flex-shrink:0}
.rtag-Hero{background:#FAEEDA;color:#633806}.rtag-Infantry{background:#E6F1FB;color:#0C447C}
.rtag-War-Machine{background:#FCEBEB;color:#791F1F}.rtag-Monster{background:#EAF3DE;color:#27500A}.rtag-Other{background:#F1EFE8;color:#444441}
/* Weapon table */
.w-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:3px;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.w-row:last-child{border-bottom:none}
.w-hdr{color:var(--txtd);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-family:'Cinzel',serif}
/* Damage badge */
.dmg-badge{display:inline-block;background:var(--surf3);border:1px solid var(--goldd);border-radius:3px;padding:1px 7px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap;flex-shrink:0}
.dmg-badge.good{background:rgba(42,107,58,.25);border-color:var(--grn2);color:var(--grn2)}
.dmg-badge.zero{color:var(--txtf);border-color:var(--bdr);background:transparent}
/* Points bar */
.pts-bar-wrap{height:6px;background:var(--surf3);border-radius:4px;overflow:hidden;margin:5px 0}
.pts-bar{height:100%;border-radius:4px;transition:width .45s}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:34px;height:18px;border-radius:9px;border:1px solid var(--bdr);position:relative;cursor:pointer;flex-shrink:0}
.toggle-thumb{width:12px;height:12px;border-radius:6px;position:absolute;top:2px;transition:left .2s}
.ab-tag{font-size:10px;color:#b08adf;font-style:italic}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;width:100%;max-width:800px;padding:18px;max-height:92vh;display:flex;flex-direction:column}
.modal-list{overflow-y:auto;flex:1;margin-top:8px}
.db-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:9px 12px;margin-bottom:6px;transition:border-color .2s}
.db-card:hover{border-color:var(--goldd)}
/* Faction picker grid */
.faction-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.faction-btn{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:11px 13px;cursor:pointer;text-align:left;transition:all .2s;width:100%;position:relative}
.faction-btn:hover,.faction-btn.selected{border-color:var(--gold);background:var(--surf3)}
.faction-btn-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--txt);margin-bottom:2px}
.faction-btn-sub{font-size:10px;color:var(--txtd)}
.faction-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px;margin-bottom:-1px;flex-shrink:0}
/* Spinner */
.spinner{width:18px;height:18px;border:2px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
/* Regiment */
.regiment-card{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;margin-bottom:12px;overflow:hidden}
.regiment-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
.regiment-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.regiment-body{padding:10px 14px}
.regiment-hero{background:rgba(201,146,42,.08);border:1px solid var(--goldd);border-radius:4px;padding:8px 11px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.regiment-hero-empty{border:1px dashed var(--goldd);border-radius:4px;padding:8px 11px;margin-bottom:7px;text-align:center;color:var(--goldd);font-size:12px;font-family:'Cinzel',serif;cursor:pointer;transition:background .2s}
.regiment-hero-empty:hover{background:rgba(201,146,42,.06)}
.regiment-unit{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:6px 10px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.regiment-unit-slot{border:1px dashed var(--bdr);border-radius:3px;padding:6px 10px;margin-bottom:5px;text-align:center;color:var(--txtf);font-size:12px;cursor:pointer;transition:all .2s}
.regiment-unit-slot:hover{background:var(--surf2);border-color:var(--goldd);color:var(--txtd)}
.val-ok{color:var(--grn2);font-size:11px;margin-bottom:8px}
.val-warn{color:var(--gold);font-size:11px;margin-bottom:4px}
.val-err{color:var(--red2);font-size:11px;margin-bottom:4px}
/* Battle */
.battle-army-panel{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:10px 12px;margin-top:8px}
.battle-unit-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:13px;gap:8px}
.battle-unit-row:last-child{border-bottom:none}
/* Stat chip */
.stat-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:2px 7px;font-size:11px;font-family:'Cinzel',serif}
.stat-chip span{color:var(--txtd);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.big-val{font-family:'Cinzel',serif;font-size:34px;font-weight:900;color:var(--gold)}
.stat-val{font-family:'Cinzel',serif;font-size:20px;font-weight:700}

/* Ability cards */
.ab-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:8px 11px;margin-bottom:6px}
.ab-card:last-child{margin-bottom:0}
.ab-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--txt);margin-bottom:3px}
.ab-timing{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.ab-timing-passive{background:rgba(90,90,90,.3);color:var(--txtd)}
.ab-timing-active{background:rgba(201,146,42,.15);color:var(--gold)}
.ab-timing-spell{background:rgba(80,60,160,.25);color:#b08adf}
.ab-section{font-size:11px;margin-bottom:3px;line-height:1.45}
.ab-section span{color:var(--txtd);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;margin-right:5px}
.ab-keywords{font-size:10px;color:#b08adf;font-style:italic;margin-top:2px}
.unit-expand-btn{background:none;border:none;color:var(--txtd);cursor:pointer;font-size:10px;font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase;width:100%;text-align:center;padding:5px 0;margin-top:4px;transition:color .2s}
.unit-expand-btn:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script>
// ── Faction manifest ───────────────────────────────────────────────────────
const FACTIONS_MANIFEST = [
  ["Beasts of Chaos",       "Beasts of Chaos - Library.cat",       "Beasts of Chaos.cat"],
  ["Blades of Khorne",      "Blades of Khorne - Library.cat",      "Blades of Khorne.cat"],
  ["Cities of Sigmar",      "Cities of Sigmar - Library.cat",      "Cities of Sigmar.cat"],
  ["Daughters of Khaine",   "Daughters of Khaine - Library.cat",   "Daughters of Khaine.cat"],
  ["Disciples of Tzeentch", "Disciples of Tzeentch - Library.cat", "Disciples of Tzeentch.cat"],
  ["Flesh-eater Courts",    "Flesh-eater Courts - Library.cat",    "Flesh-eater Courts.cat"],
  ["Fyreslayers",           "Fyreslayers - Library.cat",           "Fyreslayers.cat"],
  ["Gloomspite Gitz",       "Gloomspite Gitz - Library.cat",       "Gloomspite Gitz.cat"],
  ["Hedonites of Slaanesh", "Hedonites of Slaanesh - Library.cat", "Hedonites of Slaanesh.cat"],
  ["Helsmiths of Hashut",   "Helsmiths of Hashut - Library.cat",   "Helsmiths of Hashut.cat"],
  ["Idoneth Deepkin",       "Idoneth Deepkin - Library.cat",       "Idoneth Deepkin.cat"],
  ["Ironjawz",              "Ironjawz - Library.cat",              "Ironjawz.cat"],
  ["Kharadron Overlords",   "Kharadron Overlords - Library.cat",   "Kharadron Overlords.cat"],
  ["Kruleboyz",             "Kruleboyz - Library.cat",             "Kruleboyz.cat"],
  ["Lumineth Realm-lords",  "Lumineth Realm-lords - Library.cat",  "Lumineth Realm-lords.cat"],
  ["Ossiarch Bonereapers",  "Ossiarch Bonereapers - Library.cat",  "Ossiarch Bonereapers.cat"],
  ["Seraphon",              "Seraphon - Library.cat",              "Seraphon.cat"],
  ["Skaven",                "Skaven - Library.cat",                "Skaven.cat"],
  ["Slaves to Darkness",    "Slaves to Darkness - Library.cat",    "Slaves to Darkness.cat"],
  ["Sons of Behemat",       "Sons of Behemat - Library.cat",       "Sons of Behemat.cat"],
  ["Soulblight Gravelords", "Soulblight Gravelords - Library.cat", "Soulblight Gravelords.cat"],
  ["Stormcast Eternals",    "Stormcast Eternals - Library.cat",    "Stormcast Eternals.cat"],
];

const FACTION_COLORS = {
  "Skaven":"#c9922a","Idoneth Deepkin":"#2dd4bf","Lumineth Realm-lords":"#5b9fc0",
  "Blades of Khorne":"#c0392b","Stormcast Eternals":"#f0c040","Daughters of Khaine":"#a0305a",
  "Slaves to Darkness":"#8090a0","Soulblight Gravelords":"#8b2a8b","Flesh-eater Courts":"#4a7a3a",
  "Ossiarch Bonereapers":"#b0a070","Cities of Sigmar":"#4060a0","Fyreslayers":"#e05020",
  "Kharadron Overlords":"#40a0c0","Seraphon":"#2060c0","Gloomspite Gitz":"#806030",
  "Ironjawz":"#408040","Kruleboyz":"#507040","Beasts of Chaos":"#704030",
  "Disciples of Tzeentch":"#40c0c0","Hedonites of Slaanesh":"#c040c0",
  "Sons of Behemat":"#808060","Helsmiths of Hashut":"#c06030",
};

const RAW_BASE = "https://raw.githubusercontent.com/Se4sons/DoubleTurn.html/main/";

// ── XML parser helpers ─────────────────────────────────────────────────────
// .cat files use a namespace, so querySelector fails. We strip the namespace
// from the XML text before parsing so we can use normal DOM methods.
function parseCAT(xmlText) {
  // Remove namespace declaration and prefixes so querySelector works
  const clean = xmlText
    .replace(/xmlns="[^"]*"/g, '')
    .replace(/xmlns:[a-z]+="[^"]*"/g, '');
  const parser = new DOMParser();
  return parser.parseFromString(clean, 'application/xml');
}

function charVal(profile, name) {
  const chars = profile.getElementsByTagName('characteristic');
  for (const c of chars) {
    if (c.getAttribute('name') === name) return c.textContent.trim();
  }
  return '-';
}

const ROLE_KEYWORDS = {
  'HERO':'Hero','UNIQUE':'Hero','WARMASTER':'Hero',
  'INFANTRY':'Infantry','CAVALRY':'Infantry',
  'MONSTER':'Monster','BEAST':'Monster',
  'WAR MACHINE':'War Machine','ARTILLERY':'War Machine',
};

function extractRole(entry) {
  // Walk direct categoryLink children only
  const catLinks = entry.getElementsByTagName('categoryLinks');
  if (!catLinks.length) return 'Other';
  const links = catLinks[0].getElementsByTagName('categoryLink');
  // First pass: non-primary named role keywords
  for (const cl of links) {
    const n = (cl.getAttribute('name') || '').toUpperCase();
    if (ROLE_KEYWORDS[n]) return ROLE_KEYWORDS[n];
  }
  return 'Other';
}

function parseAbility(abilityStr) {
  const s = String(abilityStr || '');
  if (s.includes('Crit(Mortal)') || s.includes('Crit: Mortal'))        return 'Crit: Mortal';
  if (s.includes('Crit(2Hits)') || s.includes('Crit: 2 Hits'))         return 'Crit: 2 Hits';
  if (s.includes('Crit(Auto-wound)') || s.includes('Crit: Auto-wound')) return 'Crit: Auto-wound';
  return 'None';
}

function diceAvg(s) {
  s = String(s || '').trim().replace(/\s/g, '');
  if (!s || s === '-' || s === '?') return null;
  const n = parseFloat(s);
  if (!isNaN(n)) return n;
  let total = 0, sign = 1, i = 0;
  while (i < s.length) {
    if (s[i] === '+') { sign = 1; i++; continue; }
    if (s[i] === '-') { sign = -1; i++; continue; }
    const dm = s.slice(i).match(/^(\d*)D(\d+)/i);
    if (dm) {
      const n2 = dm[1] ? parseInt(dm[1]) : 1;
      total += sign * n2 * (parseInt(dm[2]) + 1) / 2;
      i += dm[0].length; sign = 1;
    } else {
      const nm = s.slice(i).match(/^(\d+)/);
      if (nm) { total += sign * parseFloat(nm[1]); i += nm[0].length; sign = 1; }
      else i++;
    }
  }
  return total || null;
}

function hitProb(s) {
  s = String(s || '').trim();
  const m = s.match(/^(\d+)\+?$/);
  return m ? Math.max(0, Math.min(1, (7 - parseInt(m[1])) / 6)) : null;
}

function rendInt(s) {
  s = String(s || '').trim();
  if (s === '-' || s === '') return 0;
  const n = parseInt(s);
  // .cat stores rend as positive integer e.g. "1" = rend -1
  if (!isNaN(n) && n > 0) return -n;
  return isNaN(n) ? 0 : n;
}

// ── Parse Library.cat into units array ────────────────────────────────────
function parseLibrary(doc, factionName) {
  const units = [];

  // Find sharedSelectionEntries > selectionEntry[type=unit]
  const shared = doc.getElementsByTagName('sharedSelectionEntries');
  if (!shared.length) return units;

  const allEntries = shared[0].getElementsByTagName('selectionEntry');
  for (const entry of allEntries) {
    if (entry.getAttribute('type') !== 'unit') continue;
    if (entry.getAttribute('hidden') === 'true') continue;
    // Only direct children of sharedSelectionEntries
    if (entry.parentNode !== shared[0]) continue;

    const unitName = entry.getAttribute('name');
    if (!unitName) continue;

    const role = extractRole(entry);

    // Unit stats
    let health = 0, save = '-', move = '-', control = 0;
    const profileEls = entry.getElementsByTagName('profile');
    for (const prof of profileEls) {
      if (prof.getAttribute('typeName') === 'Unit') {
        health  = parseInt(charVal(prof, 'Health'))  || 0;
        save    = charVal(prof, 'Save');
        move    = charVal(prof, 'Move');
        control = parseInt(charVal(prof, 'Control')) || 0;
        break;
      }
    }

    // Weapon profiles — collect from all nested profiles
    const weapons = [];
    const seenWeapons = new Set();

    for (const prof of profileEls) {
      const typeName = prof.getAttribute('typeName') || '';
      const isRanged = typeName.includes('Ranged');
      const isMelee  = typeName.includes('Melee');
      if (!isRanged && !isMelee) continue;

      const wName = prof.getAttribute('name') || '';
      if (!wName || seenWeapons.has(wName)) continue;
      seenWeapons.add(wName);

      const atk = charVal(prof, 'Atk');
      const hit = charVal(prof, 'Hit');
      const wnd = charVal(prof, 'Wnd');
      const rnd = charVal(prof, 'Rnd');
      const dmg = charVal(prof, 'Dmg');
      const abl = charVal(prof, 'Ability');

      if (atk === '-' && hit === '-') continue;

      const atk_avg = diceAvg(atk);
      const hit_prob = hitProb(hit);
      const wnd_prob = hitProb(wnd);
      const dmg_avg  = diceAvg(dmg);
      const rnd_int  = rendInt(rnd);

      weapons.push({
        name: wName,
        type: isRanged ? 'Ranged' : 'Melee',
        atk, hit, wnd,
        rnd: rnd_int === 0 ? '-' : String(rnd_int),
        dmg,
        atk_avg, hit_prob, wnd_prob, dmg_avg, rnd_int,
        abilities: parseAbility(abl),
      });
    }

    if (weapons.length === 0) continue;

    // Unit abilities
    const abilities = [];
    const seenAbils = new Set();
    const ABIL_TYPES = ['Ability (Passive)', 'Ability (Activated)', 'Ability (Spell)'];
    for (const prof of profileEls) {
      const tname = prof.getAttribute('typeName') || '';
      if (!ABIL_TYPES.includes(tname)) continue;
      const aName = prof.getAttribute('name') || '';
      if (!aName || seenAbils.has(aName)) continue;
      seenAbils.add(aName);
      const clean = s => (s||'').replace(/\*\*\^\^([^^]+)\^\^\*\*/g,'$1').replace(/\*\*/g,'').replace(/\^\^/g,'').trim();
      const ab = {
        name: aName,
        type: tname,
        timing:    clean(charVal(prof,'Timing')),
        castValue: clean(charVal(prof,'Casting Value')),
        declare:   clean(charVal(prof,'Declare')),
        effect:    clean(charVal(prof,'Effect')),
        keywords:  clean(charVal(prof,'Keywords')),
      };
      abilities.push(ab);
    }

    // Unit size from min constraint
    let size = 1;
    const constraints = entry.getElementsByTagName('constraint');
    for (const con of constraints) {
      if (con.getAttribute('type') === 'min' && con.getAttribute('scope') === 'parent') {
        const v = parseInt(con.getAttribute('value'));
        if (v > 1) { size = v; break; }
      }
    }

    units.push({
      id: unitName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''),
      name: unitName,
      army: factionName,
      faction: factionName,
      role, pts: 0, size,
      health, save, move, control,
      weapons, abilities,
    });
  }

  return units;
}

// ── Parse points from main .cat ────────────────────────────────────────────
function parsePoints(doc, units) {
  const byName = {};
  units.forEach(u => { byName[u.name] = u; });

  const allEntries = doc.getElementsByTagName('selectionEntry');
  for (const el of allEntries) {
    const name = el.getAttribute('name');
    if (!name || !byName[name]) continue;
    const costs = el.getElementsByTagName('cost');
    for (const cost of costs) {
      if (cost.getAttribute('name') === 'pts') {
        const v = parseFloat(cost.getAttribute('value') || '0');
        if (v > 0) byName[name].pts = v;
      }
    }
  }

  // Also entryLinks
  const links = doc.getElementsByTagName('entryLink');
  for (const el of links) {
    const name = el.getAttribute('name');
    if (!name || !byName[name]) continue;
    const costs = el.getElementsByTagName('cost');
    for (const cost of costs) {
      if (cost.getAttribute('name') === 'pts') {
        const v = parseFloat(cost.getAttribute('value') || '0');
        if (v > 0) byName[name].pts = v;
      }
    }
  }
}

// ── Faction cache & loader ─────────────────────────────────────────────────
const FACTION_CACHE = {}; // factionName -> units[]
const LOADING_STATE = {}; // factionName -> 'loading'|'done'|'error'

async function loadFaction(factionName) {
  if (FACTION_CACHE[factionName]) return FACTION_CACHE[factionName];
  if (LOADING_STATE[factionName] === 'loading') {
    // Wait for it
    await new Promise(res => {
      const iv = setInterval(() => {
        if (LOADING_STATE[factionName] !== 'loading') { clearInterval(iv); res(); }
      }, 100);
    });
    return FACTION_CACHE[factionName] || [];
  }

  LOADING_STATE[factionName] = 'loading';
  const manifest = FACTIONS_MANIFEST.find(f => f[0] === factionName);
  if (!manifest) { LOADING_STATE[factionName] = 'error'; return []; }

  try {
    const [, libFile, mainFile] = manifest;
    const [libRes, mainRes] = await Promise.all([
      fetch(RAW_BASE + encodeURIComponent(libFile)),
      fetch(RAW_BASE + encodeURIComponent(mainFile)),
    ]);
    const [libXml, mainXml] = await Promise.all([libRes.text(), mainRes.text()]);
    const libDoc  = parseCAT(libXml);
    const mainDoc = parseCAT(mainXml);

    const units = parseLibrary(libDoc, factionName);
    parsePoints(mainDoc, units);
    // Also try parsing points from library (some are embedded)
    parsePoints(libDoc, units);

    FACTION_CACHE[factionName] = units;
    LOADING_STATE[factionName] = 'done';
    return units;
  } catch(err) {
    console.error('Failed to load faction:', factionName, err);
    LOADING_STATE[factionName] = 'error';
    return [];
  }
}

// ── Damage calc ────────────────────────────────────────────────────────────
function calcAvgDmg(w, save, size) {
  const {atk_avg: atk, hit_prob: hit, wnd_prob: wnd, dmg_avg: dmg, rnd_int: rv} = w;
  if ([atk, hit, wnd, dmg].some(x => x == null || isNaN(x))) return null;
  const sz  = size || 1;
  const eff = Math.max(2, Math.min(7, save - rv));
  const sf  = Math.min(1, Math.max(0, (eff - 1) / 6));
  const ab  = String(w.abilities || '');
  const hasMort = ab.includes('Crit: Mortal');
  const has2Hit = ab.includes('Crit: 2 Hits');
  const hasAuto = ab.includes('Crit: Auto-wound');
  const tot = sz * atk;
  if (hasMort && hasAuto)       return tot * ((1/6)*dmg + Math.max(0, hit-1/6)*sf*dmg);
  if (hasMort && has2Hit)       return tot * ((1/6)*dmg + (Math.max(0, hit-1/6)+1/6)*wnd*sf*dmg);
  if (hasMort)                  return tot * ((1/6)*dmg + Math.max(0, hit-1/6)*wnd*sf*dmg);
  if (has2Hit && hasAuto)       return tot * ((2/6)*sf*dmg + Math.max(0, hit-1/6)*wnd*sf*dmg);
  if (has2Hit)                  return tot * Math.max(0, hit+1/6)*wnd*sf*dmg;
  if (hasAuto)                  return tot * ((1/6)*sf*dmg + Math.max(0, hit-1/6)*wnd*sf*dmg);
  return tot * hit * wnd * sf * dmg;
}

function bestDmg(unit, save) {
  if (!unit?.weapons) return null;
  let best = null;
  unit.weapons.forEach(w => {
    const a = calcAvgDmg(w, save, unit.size);
    if (a != null && (best == null || a > best)) best = a;
  });
  return best;
}

// ── Roster Tab ─────────────────────────────────────────────────────────────
function renderRoster(c) {
  const s = S.roster;
  const rd = () => { c.innerHTML=''; renderRoster(c); };
  c.append(e('div',{cls:'sec-title'},'\uD83D\uDCCB Army Roster'));

  // Army tabs
  const tr = e('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'10px',alignItems:'center'}});

    const ac = FACTION_COLORS[a.army]||'var(--gold)';

  nb.onclick = () => { s.pickingArmy=true; rd(); }; tr.append(nb); c.append(tr);

  // New army picker
  if(s.pickingArmy) {
    const nameIn = e('input',{type:'text',placeholder:'Name your army...',style:{marginBottom:'10px'}});
    let chosen = FACTIONS_MANIFEST[0][0];
    const grid = e('div',{cls:'faction-grid'});
    FACTIONS_MANIFEST.forEach(([fname]) => {
      const col = FACTION_COLORS[fname]||'#808080';
      const loaded = FACTION_CACHE[fname] ? '\u2713 loaded' : '';
      const ab = e('button',{cls:'faction-btn'+(chosen===fname?' selected':'')},
        e('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px'}},
          e('div',{cls:'faction-dot',style:{background:col}}),
          e('div',{cls:'faction-btn-name'},fname)

        e('div',{cls:'faction-btn-sub'},loaded||'Click to select')

      ab.onclick = () => { chosen=fname; grid.querySelectorAll('.faction-btn').forEach(b=>b.classList.remove('selected')); ab.classList.add('selected'); };
      grid.append(ab);
    });
    c.append(e('div',{cls:'dcard',style:{borderColor:'var(--goldd)',marginBottom:'12px'}},
      e('div',{style:{fontFamily:"'Cinzel',serif",fontSize:'12px',color:'var(--gold)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'10px'}},'Choose Faction'),
      nameIn, grid,
      e('div',{style:{display:'flex',gap:'8px',marginTop:'9px'}},
        btn('Create Roster',()=>{
          const n=nameIn.value.trim()||chosen+' Warhost';
          const id=Date.now();
          s.armies.push({id,name:n,army:chosen,limit:2000,regiments:[{id:id+1,hero:null,units:[null,null,null]}]});
          s.active=id; s.pickingArmy=false; rd();
        },'btn-gold'),
        btn('Cancel',()=>{s.pickingArmy=false;rd();},'btn-ghost')
      )
    ));
    return;
  }

  const a = s.armies.find(x=>x.id===s.active);
  if(!a) return;
  if(!a.regiments) a.regiments=[{id:Date.now(),hero:null,units:[null,null,null]}];
  if(!s.expanded) s.expanded={};

  const ac = FACTION_COLORS[a.army]||'var(--gold)';

  // Name row
  const nameIn = e('input',{type:'text',value:a.name,style:{flex:'1',fontSize:'13px',marginBottom:'10px'}});
  nameIn.oninput = ev => { a.name=ev.target.value; };
  const nameRow = e('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'0'}},
    e('span',{cls:'lbl',style:{marginBottom:'0',flexShrink:'0'}},'Army name:'), nameIn);
  c.append(nameRow);

  // Points bar
  const totalPts = a.regiments.reduce((t,reg)=>{let p=reg.hero?reg.hero.pts:0;reg.units.forEach(u=>{if(u)p+=u.pts;});return t+p;},0);
  const pct = Math.min(1,totalPts/a.limit);
  const barCol = pct>1?'var(--red2)':pct>0.85?'var(--gold)':'var(--acc2)';
  const ptsSel = e('input',{type:'number',value:String(a.limit),min:'500',step:'500',style:{width:'64px',fontSize:'12px',padding:'3px 5px'}});
  ptsSel.oninput = ev => { a.limit=+ev.target.value; rd(); };
  c.append(e('div',{cls:'dcard',style:{marginBottom:'12px',marginTop:'8px'}},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        e('div',{cls:'faction-dot',style:{background:ac,width:'10px',height:'10px'}}),
        e('span',{style:{fontFamily:"'Cinzel',serif",fontSize:'12px',color:ac,fontWeight:'700'}},a.army),
        e('span',{cls:'lbl',style:{marginBottom:'0'}},'\u2014 Points')
      ),
      e('div',{style:{display:'flex',alignItems:'baseline',gap:'5px'}},
        e('span',{style:{fontFamily:"'Cinzel',serif",fontSize:'17px',fontWeight:'700',color:pct>1?'var(--red2)':'var(--gold)'}},totalPts),
        e('span',{style:{color:'var(--txtd)'}},'/'), ptsSel
      )
    ),
    e('div',{cls:'pts-bar-wrap'},e('div',{cls:'pts-bar',style:{width:pct*100+'%',background:barCol}})),
    e('div',{style:{fontSize:'11px',color:'var(--txtd)',marginTop:'4px'}},pct>1?(totalPts-a.limit)+' over limit':(a.limit-totalPts)+' pts remaining')
  ));

  // Validation
  const errs=[],warns=[];
  if(a.regiments.length>5) errs.push('Too many regiments (max 5)');
  a.regiments.forEach((reg,ri)=>{if(!reg.hero)warns.push('Regiment '+(ri+1)+' needs a Hero');});
  if(errs.length) errs.forEach(m=>c.append(e('div',{cls:'val-err'},'\u26a0 '+m)));
  else if(warns.length) warns.forEach(m=>c.append(e('div',{cls:'val-warn'},'\u26a0 '+m)));
  else c.append(e('div',{cls:'val-ok'},'\u2713 Army structure valid'));

  // Cache status indicator
  const isLoaded = !!FACTION_CACHE[a.army];
  if(!isLoaded) {
    c.append(e('div',{style:{color:'var(--txtd)',fontSize:'12px',fontStyle:'italic',marginBottom:'8px'}},
      spinner(),' Data will load when you open the unit picker'));
  }

  // Regiment cards
  a.regiments.forEach((reg,ri) => {
    const filled = reg.units.filter(Boolean).length;
    const key = 'r'+ri+'-'+a.id;
    const regCard = e('div',{cls:'regiment-card'});
    const rmBtn = a.regiments.length>1 ? (()=>{const b=e('button',{style:{background:'none',border:'none',color:'var(--txtf)',cursor:'pointer',fontSize:'11px',fontFamily:"'Cinzel',serif"}},'Remove');b.onclick=()=>{a.regiments.splice(ri,1);rd();};return b;})() : null;
    regCard.append(e('div',{cls:'regiment-hdr'},
      e('span',{cls:'regiment-title'},'Regiment '+(ri+1)),
      e('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},e('span',{style:{fontSize:'11px',color:'var(--txtd)'}},filled+'/3 units'),rmBtn)
    ));
    const body = e('div',{cls:'regiment-body'});

    // Helper: render a filled unit row with per-unit expand
    const cachedUnits = FACTION_CACHE[a.army]||[];

    function renderUnitRow(unitData, slotKey, onRemove, isHeroSlot) {
      const dbU = cachedUnits.find(u=>u.name===unitData.name);
      const dmg = dbU?bestDmg(dbU,S.save):null;
      const expKey = key+'-'+slotKey;
      const unitExp = !!s.expanded[expKey];

      const wrap = e('div',{style:{marginBottom:'5px'}});

      // Compact row — click anywhere except remove to toggle
      const rowCls = isHeroSlot ? 'regiment-hero' : 'regiment-unit';
      const row = e('div',{cls:rowCls,style:{cursor:'pointer',userSelect:'none'}},
        e('div',{style:{display:'flex',alignItems:'center',gap:'7px',flex:'1',flexWrap:'wrap',minWidth:'0'}},
          isHeroSlot ? e('span',{style:{fontSize:'11px',color:'var(--gold)',fontFamily:"'Cinzel',serif",flexShrink:'0'}},'\u2605 HERO') : roleTag(unitData.role),
          e('span',{style:{fontWeight:'600',fontSize:'13px'}},unitData.name),
          e('span',{style:{color:'var(--txtd)',fontSize:'11px'}},unitData.pts+' pts'),
          dmg!=null?dmgBadge(dmg):null,
          e('span',{style:{color:'var(--txtf)',fontSize:'10px',marginLeft:'auto'}},unitExp?'\u25b2':'\u25bc')
        ),
        (()=>{
          const b=e('button',{style:{background:'none',border:'none',color:'var(--txtf)',cursor:'pointer',fontSize:'14px',flexShrink:'0'}},'\u2715');
          b.onclick=ev=>{ev.stopPropagation();onRemove();};
          return b;
        })()
      );
      row.onclick = () => { s.expanded[expKey]=!unitExp; rd(); };
      wrap.append(row);

      // Expandable detail panel
      if(unitExp && dbU) {
        const detail = e('div',{style:{background:'var(--surf)',border:'1px solid var(--bdr)',borderTop:'none',borderRadius:'0 0 4px 4px',padding:'10px 12px',marginTop:'-5px',marginBottom:'0'}});
        detail.append(e('div',{style:{color:'var(--gold)',fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'4px'}},'Weapons'));
        detail.append(wTable(dbU.weapons, S.save, dbU.size));
        if(dbU.abilities && dbU.abilities.length) {
          detail.append(e('div',{style:{color:'var(--gold)',fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'2px',textTransform:'uppercase',margin:'10px 0 4px'}},'Abilities ('+dbU.abilities.length+')'));
          detail.append(abilityPanel(dbU.abilities));
        }
        wrap.append(detail);
      }
      return wrap;
    }

    // Hero slot
    if(reg.hero) {
      body.append(renderUnitRow(reg.hero, 'hero', ()=>{reg.hero=null;rd();}, true));
    } else {
      const he = e('div',{cls:'regiment-hero-empty'},'\u2605 Click to select Hero');
      he.onclick = () => { s.modal={armyId:a.id,regIdx:ri,slot:'hero'}; s.showModal=true; rd(); };
      body.append(he);
    }

    // Unit slots
    for(let si=0;si<3;si++) {
      const unit = reg.units[si];
      if(unit) {
        body.append(renderUnitRow(unit, 'u'+si, ()=>{reg.units[si]=null;rd();}, false));
      } else {
        const sl = e('div',{cls:'regiment-unit-slot'},'+ Slot '+(si+1)+' \u2014 click to add unit');
        sl.onclick = () => { s.modal={armyId:a.id,regIdx:ri,slot:si}; s.showModal=true; rd(); };
        body.append(sl);
      }
    }

    regCard.append(body);
    c.append(regCard);
  });

  if(a.regiments.length<5) {
    c.append(btn('+ Add Regiment ('+a.regiments.length+'/5)',()=>{a.regiments.push({id:Date.now(),hero:null,units:[null,null,null]});rd();},'btn-ghost'));
  } else {
    c.append(e('div',{style:{color:'var(--txtf)',fontSize:'12px',fontStyle:'italic',padding:'4px 0'}},'Maximum 5 regiments reached.'));
  }

  // Unit picker modal
  if(s.showModal && s.modal && s.modal.armyId===a.id) {
    const {regIdx,slot} = s.modal;
    const isHero = slot==='hero';

    const modalEl = e('div',{cls:'modal'});
    const ovEl = e('div',{cls:'modal-overlay'},modalEl);
    ovEl.onclick = ev => { if(ev.target===ovEl){s.showModal=false;s.modal=null;rd();} };

    modalEl.append(e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
      e('div',{style:{fontFamily:"'Cinzel',serif",fontWeight:'700',fontSize:'13px',color:'var(--gold)',letterSpacing:'2px',textTransform:'uppercase'}},
        isHero?'Select Hero \u2014 Regiment '+(regIdx+1):'Add Unit \u2014 Slot '+(slot+1)),
      (()=>{const b=e('button',{style:{background:'none',border:'1px solid var(--bdr)',color:'var(--txtd)',borderRadius:'3px',padding:'4px 10px',cursor:'pointer',fontSize:'11px',fontFamily:"'Cinzel',serif"}},'Close');b.onclick=()=>{s.showModal=false;s.modal=null;rd();};return b;})()
    ));

    const searchIn = e('input',{type:'text',placeholder:'Search units...',style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)',marginBottom:'8px'}});
    const rolSel = e('select',{style:{background:'var(--surf2)',border:'1px solid var(--bdr)',color:'var(--txt)',marginBottom:'8px'}});
    const roleOpts = isHero?['Hero']:['Infantry','War Machine','Monster','Other'];
    [e('option',{value:'All'},'All roles'),...roleOpts.map(r=>e('option',{value:r},r))].forEach(o=>rolSel.append(o));
    modalEl.append(e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},searchIn,rolSel));

    const listEl = e('div',{cls:'modal-list'});
    modalEl.append(listEl);

    const loadingEl = e('div',{style:{textAlign:'center',padding:'30px 0',color:'var(--txtd)'}},
      spinner(), e('div',{style:{marginTop:'10px',fontSize:'12px',fontFamily:"'Cinzel',serif"}},'Loading '+a.army+' data\u2026')
    );
    listEl.append(loadingEl);
    c.append(ovEl);

    // Load faction data then populate list
    loadFaction(a.army).then(units => {
      listEl.innerHTML='';
      let pool = units.filter(u => isHero ? u.role==='Hero' : u.role!=='Hero');

      function buildList() {
        listEl.innerHTML='';
        const q = searchIn.value.toLowerCase();
        const filtered = pool.filter(u =>
          (!q || u.name.toLowerCase().includes(q) || u.faction.toLowerCase().includes(q)) &&
          (rolSel.value==='All' || u.role===rolSel.value)
        );
        if(!filtered.length) {
          listEl.append(e('div',{style:{textAlign:'center',padding:'20px',color:'var(--txtf)',fontStyle:'italic'}},'No units match.'));
          return;
        }
        const expandedUnits = new Set();
        filtered.forEach(u => {
          const dmg = bestDmg(u,S.save);
          const addBtn = e('button',{cls:'btn btn-gold',style:{padding:'4px 12px',fontSize:'10px'}},'+ Add');
          addBtn.onclick = () => {
            const entry = {id:Date.now(),name:u.name,role:u.role,faction:u.faction,army:u.army,pts:u.pts,size:u.size};
            const reg = a.regiments[regIdx];
            if(isHero) reg.hero=entry; else reg.units[slot]=entry;
            s.showModal=false; s.modal=null; rd();
          };
          // Unit stats chips
          const statsRow = e('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap',marginTop:'4px',marginBottom:'4px'}});
          if(u.health)  statsRow.append(e('div',{cls:'stat-chip'},e('span',{},'HP'),u.health));
          if(u.save)    statsRow.append(e('div',{cls:'stat-chip'},e('span',{},'SV'),u.save));
          if(u.move)    statsRow.append(e('div',{cls:'stat-chip'},e('span',{},'MV'),u.move));
          if(u.size>1)  statsRow.append(e('div',{cls:'stat-chip'},e('span',{},'SIZE'),u.size));

          const cardEl = e('div',{cls:'db-card'});
          const bodyEl = e('div',{});
          const detailEl = e('div',{style:{display:'none'}});

          // Header
          bodyEl.append(
            e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'5px',marginBottom:'4px'}},
              e('div',{style:{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}},
                roleTag(u.role),
                e('span',{style:{fontWeight:'600',fontSize:'13px'}},u.name),
                dmg!=null?dmgBadge(dmg):null
              ),
              e('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                e('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Cinzel',serif",fontSize:'12px'}},u.pts>0?u.pts+' pts':'? pts'),
                addBtn
              )
            ),
            statsRow
          );

          // Expand button
          const expBtn = e('button',{cls:'unit-expand-btn'},'▼ Weapons & Abilities');
          let expanded = false;
          expBtn.onclick = () => {
            expanded = !expanded;
            expBtn.textContent = expanded ? '▲ Hide details' : '▼ Weapons & Abilities';
            detailEl.style.display = expanded ? 'block' : 'none';
          };
          bodyEl.append(expBtn);

          // Detail panel (hidden by default)
          const sep1 = e('div',{style:{color:'var(--gold)',fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'2px',textTransform:'uppercase',margin:'8px 0 4px'}},'Weapons');
          const sep2 = e('div',{style:{color:'var(--gold)',fontFamily:"'Cinzel',serif",fontSize:'10px',letterSpacing:'2px',textTransform:'uppercase',margin:'10px 0 4px'}},'Abilities ('+(u.abilities?.length||0)+')');
          detailEl.append(sep1, wTable(u.weapons,S.save,u.size), sep2, abilityPanel(u.abilities));

          cardEl.append(bodyEl, detailEl);
          listEl.append(cardEl);
        });
      }

      buildList();
      searchIn.oninput = buildList;
      rolSel.onchange = buildList;
    });
  }
}

// ── Dice Tab ───────────────────────────────────────────────────────────────
function renderDice(c) {
  const s=S.dice; const rd=()=>{c.innerHTML='';renderDice(c);};
  c.append(e('div',{cls:'sec-title'},'\uD83C\uDFB2 Dice Roller'));
  const dTypes=[4,6,8,10,12,20];
  c.append(e('div',{style:{marginBottom:'14px'}},e('span',{cls:'lbl',style:{display:'block',marginBottom:'5px'}},'Dice Type'),e('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}},...dTypes.map(d=>{const b=e('button',{style:{background:s.dtype===d?'var(--gold)':'var(--surf2)',border:'1px solid '+(s.dtype===d?'var(--gold)':'var(--bdr)'),color:s.dtype===d?'#0d0d10':'var(--txt)',borderRadius:'3px',padding:'5px 9px',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:"'Cinzel',serif"}},'D'+d);b.onclick=()=>{s.dtype=d;rd();};return b;}))));
  const ci=e('input',{type:'number',value:String(s.count),min:'1',max:'20',style:{width:'74px'}});
  ci.oninput=ev=>s.count=+ev.target.value;
  const rb=e('button',{cls:'btn btn-gold'},'Roll '+s.count+'d'+s.dtype);
  rb.onclick=()=>{s.rolling=true;rd();setTimeout(()=>{s.results=rollN(s.count,s.dtype);const tot=s.results.reduce((a,b)=>a+b,0);s.history=[{rolls:s.results.slice(),type:s.dtype,total:tot,time:new Date().toLocaleTimeString()},...s.history.slice(0,9)];s.rolling=false;rd();},400);};
  c.append(e('div',{style:{display:'flex',gap:'10px',marginBottom:'14px',alignItems:'flex-end'}},e('label',{style:{display:'flex',flexDirection:'column',gap:'3px'}},e('span',{cls:'lbl'},'Count'),ci),rb));
  if(s.rolling){c.append(e('div',{cls:'dcard',style:{textAlign:'center',padding:'24px 0'}},e('div',{style:{fontSize:'32px'}},'🎲'),e('div',{style:{color:'var(--txtf)',fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase',marginTop:'7px',fontFamily:"'Cinzel',serif"}},'Rolling...')));return;}
  if(s.results.length){
    const faces=['','⚀','⚁','⚂','⚃','⚄','⚅'];
    const dw=e('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'10px'}});
    s.results.forEach((r,i)=>{const isH=r>=s.dtype*.8,isL=r<=s.dtype*.2;dw.append(e('div',{style:{width:'38px',height:'38px',borderRadius:'5px',background:isH?'rgba(201,146,42,.18)':isL?'rgba(192,57,43,.18)':'var(--surf2)',border:'2px solid '+(isH?'var(--gold)':isL?'var(--red2)':'var(--bdr)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:s.dtype===6?'22px':'13px',fontWeight:'700',color:isH?'var(--gold)':isL?'var(--red2)':'var(--txt)',fontFamily:s.dtype===6?'serif':"'Cinzel',serif"}},s.dtype===6?faces[r]:r));});
    const tot=s.results.reduce((a,b)=>a+b,0);
    const sr=e('div',{style:{display:'flex',gap:'18px',flexWrap:'wrap'}});
    [['Total',tot,'var(--gold)'],['Avg',(tot/s.results.length).toFixed(1),'var(--txt)'],['High',Math.max(...s.results),'var(--gold)'],['Low',Math.min(...s.results),'var(--red2)']].forEach(([l,v,col])=>sr.append(e('div',{},e('span',{cls:'lbl'},l),e('span',{style:{fontFamily:"'Cinzel',serif",fontSize:'18px',fontWeight:'700',color:col}},v))));
    c.append(e('div',{cls:'dcard',style:{marginBottom:'10px'}},dw,sr));
  }
  if(s.history.length){
    c.append(e('div',{cls:'sep'},e('div',{cls:'sep-line'}),e('span',{cls:'sep-lbl'},'History'),e('div',{cls:'sep-line r'})));
    s.history.forEach((h,i)=>c.append(e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 7px',background:i===0?'var(--surf)':'transparent',border:i===0?'1px solid var(--bdr)':'1px solid transparent',borderRadius:'3px',opacity:String(Math.max(0.25,1-i*.09))}},e('span',{style:{color:'var(--txtf)',fontSize:'11px'}},h.time),e('span',{style:{color:'var(--txtd)',fontSize:'12px'}},h.rolls.length+'d'+h.type+': ['+h.rolls.join(', ')+']'),e('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Cinzel',serif",fontSize:'13px'}},'= '+h.total))));
  }
}

// ── Ability panel builder ───────────────────────────────────────────────────
function abilityPanel(abilities) {
  if (!abilities || !abilities.length) {
    return e('div',{style:{color:'var(--txtf)',fontSize:'12px',fontStyle:'italic',padding:'6px 0'}},'No abilities listed.');
  }
  const wrap = e('div',{style:{marginTop:'6px'}});
  abilities.forEach(ab => {
    const card = e('div',{cls:'ab-card'});
    card.append(e('div',{cls:'ab-name'}, ab.name));

    // Timing badge
    let timingCls = 'ab-timing-active';
    let timingLabel = ab.timing || '';
    if (!timingLabel || timingLabel === '-') { timingCls='ab-timing-passive'; timingLabel='Passive'; }
    else if (ab.type.includes('Spell')) { timingCls='ab-timing-spell'; }
    if (timingLabel && timingLabel !== '-') {
      card.append(e('div',{cls:'ab-timing '+timingCls}, timingLabel));
    }
    if (ab.castValue && ab.castValue !== '-') {
      card.append(e('div',{cls:'ab-section'},e('span',{},'Cast'),ab.castValue));
    }
    if (ab.declare && ab.declare !== '-' && ab.declare !== '') {
      card.append(e('div',{cls:'ab-section'},e('span',{},'Declare'),ab.declare));
    }
    if (ab.effect && ab.effect !== '-' && ab.effect !== '') {
      card.append(e('div',{cls:'ab-section'},e('span',{},'Effect'),ab.effect));
    }
    if (ab.keywords && ab.keywords !== '-' && ab.keywords !== '') {
      card.append(e('div',{cls:'ab-keywords'},ab.keywords));
    }
    wrap.append(card);
  });
  return wrap;
}


// ── Main render ─────────────────────────────────────────────────────────────
const TABS=[{id:'combat',icon:'\u2694',lbl:'Combat'},{id:'battle',icon:'\uD83E\uDE78',lbl:'Battle'},{id:'roster',icon:'\uD83D\uDCCB',lbl:'Roster'},{id:'dice',icon:'\uD83C\uDFB2',lbl:'Dice'}];
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  app.append(renderHeader());
  app.append(e('div',{cls:'tabs'},...TABS.map(t=>{
    const b=e('button',{cls:'tab'+(S.tab===t.id?' on':'')},e('span',{cls:'tab-icon'},t.icon),t.lbl);
    b.onclick=()=>{S.tab=t.id;render();};return b;
  })));
  const ct=e('div',{cls:'content'});
  if(S.tab==='combat')     renderCombat(ct);
  else if(S.tab==='battle') renderBattle(ct);
  else if(S.tab==='roster') renderRoster(ct);
  else                      renderDice(ct);
  app.append(ct);
}
render();
</script>
